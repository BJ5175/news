<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1 NEXT // LIVE MONITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #010409; color: #e6edf3; font-family: 'Inter', sans-serif; margin: 0; }
        .status-online { color: #22c55e; font-weight: 900; }
        .status-offline { color: #ff0000; font-weight: 900; text-shadow: 0 0 15px rgba(255,0,0,0.7); }
        .hidden { display: none !important; }
        #video-container { 
            background: #000; 
            position: relative; 
            aspect-ratio: 16/9; 
            width: 100%; 
            border-radius: 2rem; 
            overflow: hidden; 
            border: 2px solid rgba(255,255,255,0.05); 
        }
    </style>
</head>
<body>

    <nav class="border-b border-white/10 px-8 py-4 flex justify-between items-center bg-black/50 sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <div class="bg-red-600 px-3 py-1 font-black text-2xl italic tracking-tighter">N1</div>
            <div>
                <p id="top-status" class="text-[10px] font-mono uppercase tracking-widest status-offline">SIGNAL: OFFLINE</p>
                <p class="text-xs font-bold text-white uppercase tracking-tighter">Live Terminal v3.0</p>
            </div>
        </div>
        <a href="index.html" class="px-4 py-2 rounded-full text-[10px] font-bold text-white border border-white/20 hover:bg-red-600 transition-all">POČETNA</a>
    </nav>

    <main class="max-w-[1200px] mx-auto p-6 lg:p-12">
        <div id="video-container" class="shadow-2xl flex items-center justify-center">
            
            <iframe id="ninja-frame" class="absolute inset-0 w-full h-full z-10 opacity-0 transition-opacity duration-700"
                src="https://vdo.ninja/?view=MdHmrdr&autoplay=1&audio=1&m=1&quality=0&bitrate=10000&controlbar=0&chromeless=1&api=10&notify=1"
                allow="autoplay; camera; microphone; fullscreen">
            </iframe>

            <div id="offline-ui" class="z-20 p-6 text-center">
                <img src="image.png" alt="Stream Offline" class="max-w-full h-auto drop-shadow-2xl">
                <p class="mt-8 font-mono text-red-500 animate-pulse text-[10px] tracking-[0.5em] uppercase">Sustav čeka na ulazni signal...</p>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                <p class="text-[9px] text-gray-500 uppercase font-mono">Lokacija</p>
                <p class="text-sm font-bold">SARAJEVO_STUDIO_01</p>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                <p class="text-[9px] text-gray-500 uppercase font-mono">Stream ID</p>
                <p class="text-sm font-bold">MdHmrdr</p>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                <p class="text-[9px] text-gray-500 uppercase font-mono">Enkripcija</p>
                <p class="text-sm font-bold text-cyan-400">AES-256 ACTIVE</p>
            </div>
        </div>
    </main>

    <script>
        const frame = document.getElementById('ninja-frame');
        const offlineUI = document.getElementById('offline-ui');
        const topStatus = document.getElementById('top-status');

        let lastSignalTime = 0;

        // Detekcija poruka iz VDO.Ninja (Puls sustava)
        window.addEventListener('message', function(e) {
            if (e.origin.includes('vdo.ninja')) {
                lastSignalTime = Date.now();
                showOnline();
            }
        });

        function showOnline() {
            if (frame.classList.contains('opacity-0')) {
                frame.classList.remove('opacity-0');
                offlineUI.classList.add('hidden');
                topStatus.innerText = "SIGNAL: ONLINE";
                topStatus.className = "text-[10px] font-mono uppercase tracking-widest status-online";
            }
        }

        function showOffline() {
            if (!frame.classList.contains('opacity-0')) {
                frame.classList.add('opacity-0');
                offlineUI.classList.remove('hidden');
                topStatus.innerText = "SIGNAL: OFFLINE";
                topStatus.className = "text-[10px] font-mono uppercase tracking-widest status-offline";
            }
        }

        // Provjera svakih 3 sekunde - ako nema pulsa, prebaci na offline
        setInterval(() => {
            const now = Date.now();
            if (now - lastSignalTime > 5000) {
                showOffline();
            }
        }, 2000);
    </script>
</body>
</html>
